<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Exercise 6</title>
    <style>

      * {
        margin: 0;
        padding: 0;
      }

      header {
        margin: 10px 0;
        padding: 20px 40px;
      }

      .logo {
       
      }

      .logo img {
        height:45px;

      }

      nav {
        display: flex;
        justify-content: space-around;
        align-items: center;
        font-family: "Segoe UI";
        height: 77px;
        background: #d9edb5;
      }

      .right ul {
        display: flex;
        gap: 34px;
      }

      .right ul li {
        list-style: none;
        display: flex;
        align-items: center;
        cursor: pointer;
      }

      .right ul li span {
        padding: 0 5px;
      }

      .right-end {
        background-color: rgb(236, 190, 26);
        padding: 6px 14px;
        border-radius: 8px;
        cursor: pointer;
      }

      .right-end:hover {
        background-color:rgb(236, 190, 26);
        color: white;
        opacity: 0.8;
      }

      .last {
        padding: 6px 12px;
      }

      .last:hover{
        background-color: rgb(205, 205, 242);
        border-radius: 20px;
        cursor: pointer;
        opacity: 0.8;
      }

    </style>
</head>
<body>

  <header>
    <nav>
      <div class="logo">
         <img src="UE-logo.svg"alt=logo>   
      </div>
      <div class="right">
        <ul>
          <li><span>Products</span><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" color="currentColor" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

</svg></li>

    <path d="M18 9.00005C18 9.00005 13.5811 18 12 18C10.4188 18 6 9 6 9"></path>
</svg></li>
          <li><span>Resources</span><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" color="currentColor" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 9.00005C18 9.00005 13.5811 18 12 18C10.4188 18 6 9 6 9"></path>
</svg></li>
          <li><span>About Us </span><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" color="currentColor" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
